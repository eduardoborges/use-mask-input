name: CD - Docs

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (optional, default: main)"
        required: false

permissions:
  contents: read

jobs:
  deploy:
    environment:
      name: "docs"
      url: "https://use-mask-input.eduardoborges.dev"
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version || 'main' }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/turbo
            .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build Documentation
        run: pnpm run build --filter=docs

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy apps/docussaurus/build --project-name=use-mask-input
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
